<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Kombucha Homebrew Supply</title>
    
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        matcha: '#A7C957',
                        amber: '#D48C45',
                        cream: '#F7F4EB',
                        charcoal: '#333333',
                        earth: '#6B4E31',
                        offwhite: '#FAF9F6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body class="bg-offwhite text-charcoal dark:bg-charcoal dark:text-offwhite font-sans min-h-screen flex flex-col">

    <main class="w-full flex min-h-screen items-center justify-center bg-organic-gradient dark:bg-none dark:bg-[#222]">
        
        <!-- Forms Area -->
        <section class="w-full max-w-2xl flex items-center justify-center p-6 sm:p-12 md:p-24">
            
            <div class="w-full max-w-md glass p-8 sm:p-10 rounded-[2rem] shadow-2xl relative fade-up" style="transition-delay: 0.1s;">
                
                <!-- Logo inside the box -->
                <div class="flex flex-col items-center mb-8">
                    <a href="index.html" class="flex flex-col items-center gap-3 group">
                        <img src="assets/images/logo.png" alt="Logo" class="w-16 h-16 rounded-full object-cover group-hover:rotate-12 transition-transform shadow-lg shadow-matcha/20">
                        <span class="font-heading font-semibold text-2xl tracking-tight text-charcoal dark:text-white">Kombu<span class="text-matcha">cha</span></span>
                    </a>
                </div>

                <!-- Form Toggle (Login / Register) -->
                <div class="flex p-1 bg-white/50 dark:bg-black/20 rounded-full mb-8">
                    <button id="btn-login" class="flex-1 py-2 rounded-full font-bold text-sm bg-white dark:bg-charcoal shadow transition-all">Sign In</button>
                    <button id="btn-register" class="flex-1 py-2 rounded-full font-bold text-sm text-gray-500 hover:text-charcoal dark:hover:text-white transition-all">Create Account</button>
                </div>

                <!-- Login Form -->
                <div id="form-login" class="space-y-6 block">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Email Address</label>
                        <input type="email" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-matcha focus:ring-1 focus:ring-matcha transition-colors" placeholder="brewer@example.com">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Password</label>
                        <input type="password" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-matcha focus:ring-1 focus:ring-matcha transition-colors" placeholder="••••••••">
                        <div class="flex justify-end">
                            <a href="#" class="text-xs font-bold text-matcha hover:underline">Forgot password?</a>
                        </div>
                    </div>
                    <button class="w-full py-4 rounded-xl bg-charcoal text-white dark:bg-white dark:text-charcoal font-bold hover:bg-matcha dark:hover:bg-matcha dark:hover:text-white transition-colors shadow-lg">Sign In</button>
                </div>

                <!-- Registration Form -->
                <div id="form-register" class="space-y-6 hidden">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700 dark:text-gray-300">First Name</label>
                            <input type="text" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-matcha focus:ring-1 focus:ring-matcha transition-colors">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Last Name</label>
                            <input type="text" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-matcha focus:ring-1 focus:ring-matcha transition-colors">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Email Address</label>
                        <input type="email" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-matcha focus:ring-1 focus:ring-matcha transition-colors">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-700 dark:text-gray-300">Password</label>
                        <input type="password" class="w-full px-4 py-3 rounded-xl bg-white/50 dark:bg-black/20 border border-gray-200 dark:border-gray-700 focus:outline-none focus:border-matcha focus:ring-1 focus:ring-matcha transition-colors">
                    </div>
                    <button class="w-full py-4 rounded-xl bg-matcha text-white font-bold hover:bg-[#88a846] transition-colors shadow-lg">Create Account</button>
                </div>

                <!-- Social Authentication Options -->
                <div class="mt-8">
                    <div class="relative flex items-center justify-center mb-6">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-300 dark:border-gray-700"></div></div>
                        <span class="relative bg-[#FAF9F6] dark:bg-[#333] px-4 text-xs text-gray-500 uppercase font-bold tracking-wider rounded-full">Or continue with</span>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <button class="flex items-center justify-center gap-2 py-3 rounded-xl bg-white dark:bg-[#222] border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors font-bold text-sm">
                            <i class="fab fa-google text-red-500"></i> Google
                        </button>
                        <button class="flex items-center justify-center gap-2 py-3 rounded-xl bg-white dark:bg-[#222] border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors font-bold text-sm">
                            <i class="fab fa-apple"></i> Apple
                        </button>
                    </div>
                </div>

            </div>

        </section>

    </main>

    <!-- Scroll to Top -->
    <button id="scroll-to-top" aria-label="Scroll to Top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="assets/js/main.js"></script>
    <script>
        // Form toggle logic
        const btnLogin = document.getElementById('btn-login');
        const btnRegister = document.getElementById('btn-register');
        const formLogin = document.getElementById('form-login');
        const formRegister = document.getElementById('form-register');

        btnRegister.addEventListener('click', () => {
            btnLogin.classList.remove('bg-white', 'dark:bg-charcoal', 'shadow', 'text-charcoal', 'dark:text-white');
            btnLogin.classList.add('text-gray-500');
            
            btnRegister.classList.add('bg-white', 'dark:bg-charcoal', 'shadow', 'text-charcoal', 'dark:text-white');
            btnRegister.classList.remove('text-gray-500');

            formLogin.classList.remove('block');
            formLogin.classList.add('hidden');
            formRegister.classList.remove('hidden');
            formRegister.classList.add('block');
        });

        btnLogin.addEventListener('click', () => {
            btnRegister.classList.remove('bg-white', 'dark:bg-charcoal', 'shadow', 'text-charcoal', 'dark:text-white');
            btnRegister.classList.add('text-gray-500');
            
            btnLogin.classList.add('bg-white', 'dark:bg-charcoal', 'shadow', 'text-charcoal', 'dark:text-white');
            btnLogin.classList.remove('text-gray-500');

            formRegister.classList.remove('block');
            formRegister.classList.add('hidden');
            formLogin.classList.remove('hidden');
            formLogin.classList.add('block');
        });
    </script>
    <!-- Cart Drawer -->
    <div id="cart-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[999] hidden opacity-0 transition-opacity duration-300"></div>
    <div id="cart-drawer" class="fixed top-0 right-[-100%] w-full max-w-[400px] h-full bg-white dark:bg-charcoal z-[1000] shadow-2xl transition-all duration-400 ease-in-out flex flex-col">
        <div class="p-6 border-b border-gray-100 dark:border-gray-800 flex justify-between items-center">
            <h2 class="text-2xl font-heading font-bold">Your Basket</h2>
            <button id="close-cart" class="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6">
            <div id="empty-cart-msg" class="h-full flex flex-col items-center justify-center text-center space-y-4">
                <div class="w-20 h-20 bg-gray-100 dark:bg-gray-800 rounded-full flex items-center justify-center text-3xl text-gray-400">
                    <i class="fas fa-shopping-basket"></i>
                </div>
                <div>
                    <p class="font-bold text-lg">Your basket is empty</p>
                    <p class="text-gray-500 text-sm">Start adding some organic goodness!</p>
                </div>
                <button id="start-shopping" class="px-8 py-3 bg-matcha text-white rounded-full font-bold hover:scale-105 transition-transform">Start Shopping</button>
            </div>
        </div>
        <div class="p-6 border-t border-gray-100 dark:border-gray-800 space-y-4 bg-gray-50 dark:bg-black/20">
            <div class="flex justify-between items-center font-bold text-lg">
                <span>Subtotal</span>
                <span id="cart-subtotal">$0.00</span>
            </div>
            <p class="text-xs text-gray-500">Shipping and taxes calculated at checkout.</p>
            <button class="w-full py-4 bg-matcha text-white rounded-2xl font-bold text-lg hover:bg-matcha/90 transition-colors shadow-lg shadow-matcha/20">Checkout Now</button>
        </div>
    </div>
</body>
</html>
